apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: mattsel/ai-stock-prediction-web:latest
          ports:
            - containerPort: 5000
          env:
            - name: EMAIL_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: flask-app-secrets
                  key: EMAIL_ADDRESS
            - name: EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flask-app-secrets
                  key: EMAIL_PASSWORD
            - name: ALERT_EMAIL_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: flask-app-secrets
                  key: ALERT_EMAIL_ADDRESS
            - name: REDIS_URL
              value: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app
spec:
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 5001 
      targetPort: 5000
  type: LoadBalancer
